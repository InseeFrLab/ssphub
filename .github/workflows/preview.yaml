name: Preview - render and publish to gh-pages

on:
  workflow_dispatch: # To allow for manuel trigger of this workflow. Cf
  # https://docs.github.com/en/actions/reference/workflows-and-actions/events-that-trigger-workflows#workflow_dispatch
  pull_request:
    types:
      - opened
      - reopened
      - synchronize # When the ref of the branch is updated (= commit to the branch to merge)
      - closed # Including closed to remove preview when PR is closed.
    branches:
      - main # PR to main only

env:
  PREVIEW_BRANCH: gh-pages

concurrency:
  group: preview-${{ github.head_ref }} # preview followed by the reference of the branch or tag that triggered the workflow
  cancel-in-progress: true

jobs:
  build-render:
    if: github.event.action != 'closed' # If closing the PR, no publishing
    runs-on: ubuntu-latest
    # To cancel previous actions that could run on this PR
    steps:
      - name: Check out repository # https://github.com/actions/checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }} # Reference of the commit to checkout to. To ensure it's the one of the PR
          repository: ${{github.event.pull_request.head.repo.full_name}} # Reference to the branch to checkout to. Useful with PR from forks

      # add software dependencies here and any libraries
      # See more at https://github.com/quarto-dev/quarto-actions/blob/main/examples/example-03-dependencies.md
      # useful ? 
      - name: Configure safe.directory # Workaround for actions/checkout#760
        run: git config --global --add safe.directory /__w/ssphub/ssphub

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install babelquarto
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            github::ropensci-review-tools/babelquarto@a485fea

      - name: Install uv  # for post on onyxia
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install the dependancies and add venv to path
        run: | 
          uv sync
          echo "$(pwd)/.venv/bin" >> $GITHUB_PATH

      # For this workflow only
      - name: Update _quarto.yml with gh-pages preview url
        run: |
          sed -i 's/site-url:\ https:\/\/ssphub.netlify.app/site-url:\ https:\/\/inseefrlab.github.io\/ssphub\/pr-preview\/pr-${{ github.event.pull_request.number }}/g' _quarto.yml
          cat _quarto.yml

      - name: Render bilingual project
        run: |
          Rscript scripts/1_render.R

      # For this workflow only
      - name: Deploy preview
        id: deploy-preview
        uses: rossjrw/pr-preview-action@v1.8.1
        with:
          source-dir: ./_site/
          preview-branch: ${{ env.PREVIEW_BRANCH }}
          action: deploy
          comment: false

      # For this workflow only
      - name: Comment PR (custom)
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-preview
          message: |
            :rocket: View preview at <br> ${{ steps.deploy-preview.outputs.preview-url }} <br>
            <h6>Built to branch <a href="${{ github.server_url }}/${{ github.repository }}/tree/${{ env.PREVIEW_BRANCH }}"> ${{ env.PREVIEW_BRANCH }} </a> at ${{ steps.deploy-preview.outputs.action-start-time }}. <br> Preview will be ready when the <a href="${{ github.server_url }}/${{ github.repository }}/deployments">GitHub Pages deployment</a> is complete. <br> </h6>
  
  # For this workflow only
  delete-preview:
    if: github.event.action == 'closed' # Only run when PR is closed
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # To enable full access to Git repo
          ref: ${{ github.event.pull_request.head.ref }} # Reference of the commit to checkout to. To ensure it's the one of the PR
          repository: ${{github.event.pull_request.head.repo.full_name}} # Reference to the branch to checkout to. Useful with PR from forks

      - name: Remove preview
        id: remove-preview
        uses: rossjrw/pr-preview-action@v1.8.1
        with:
          action: remove

      - name: Comment PR that preview was removed
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-preview
          message: |
            Preview removed because the pull request was closed.
            ${{ steps.remove-preview.outputs.action-start-time }}
